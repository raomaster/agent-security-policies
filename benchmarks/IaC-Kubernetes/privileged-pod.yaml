# Vulnerable: Privileged container
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web
          image: nginx:1.25
          ports:
            - containerPort: 80
          securityContext:
            privileged: true
            runAsRoot: true
          volumeMounts:
            - name: host-fs
              mountPath: /host
      volumes:
        - name: host-fs
          hostPath:
            path: /
