# Vulnerable: Container without read-only filesystem
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api
          image: myapp:latest
          ports:
            - containerPort: 3000
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: true
          env:
            - name: DB_PASSWORD
              value: "plaintext-password"
